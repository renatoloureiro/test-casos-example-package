name: Complete integration test

on:
# Triggers the workflow on push or pull request events but only for the main branch
  push:
    branches: [main, action-test]
  pull_request:
    branches: [main]
  #schedule:
  #  - cron: '0 0 * * 0'
  workflow_dispatch: {}

env:
  MLM_LICENSE_TOKEN: ${{ secrets.MLM_LICENSE_TOKEN }}
  MOSEKLM_LICENSE_FILE: ${{ secrets.MSK_LICENSE }}

  # Set MOSEK version and paths
  MOSEK_VERSION: "10.1.17"
  MOSEK_INSTALL_DIR: ${{ github.workspace }}/mosek

jobs:
  # Get all CaSoS releases
  get-casos-releases:
    runs-on: ubuntu-latest
    outputs:
      releases: ${{ steps.get-releases.outputs.releases }}
      latest: ${{ steps.get-releases.outputs.latest }}
    steps:
      - name: Get CaSoS releases from GitHub
        id: get-releases
        run: |
          # Fetch all releases from iFR-OFC/casos
          RELEASES=$(curl -s \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/iFR-OFC/casos/releases?per_page=100" | \
            jq -r '[.[].tag_name] | @json')
          
          # Also get the latest release
          LATEST=$(curl -s \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/iFR-OFC/casos/releases/latest" | \
            jq -r '.tag_name // "main"')
          
          echo "releases=$RELEASES" >> $GITHUB_OUTPUT
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          echo "Found releases: $RELEASES"
          echo "Latest release: $LATEST"

      - name: Include main branch in versions
        id: include-main
        run: |
          # Add "main" to the releases array
          WITH_MAIN=$(echo '${{ steps.get-releases.outputs.releases }}' | jq -c '. + ["main"]')
          echo "versions-with-main=$WITH_MAIN" >> $GITHUB_OUTPUT
          echo "All versions (including main): $WITH_MAIN"

      - name: Set PR versions (latest + main)
        id: pr-versions
        run: |
          PR_VERSIONS='["${{ steps.get-releases.outputs.latest }}", "main"]'
          echo "pr-versions=$PR_VERSIONS" >> $GITHUB_OUTPUT
          echo "PR versions: $PR_VERSIONS"

  # run CaSoS on example package
  example-package-check:
    name: Example Package analysis
    needs: get-casos-releases
    runs-on: ubuntu-latest
    strategy: 
      fail-fast: false # continue even if one version fails
      matrix:
        # Use all releases, but limit for PRs to avoid excessive testing
        casos-version: ${{ fromJSON(
          github.event_name == 'pull_request' && 
          needs.get-casos-releases.outputs.pr-versions || 
          needs.get-casos-releases.outputs.versions-with-main
          ) }}
  
    permissions:
      checks: write
      contents: write
      pull-requests: write
      statuses: write 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup MATLAB
      - name: Setup MATLAB
        uses: ./.github/actions/MATLAB-setup
        with:
          message: "Setup MATLAB"

      - name: Cache CaSoS builds
        id: cache-casos
        uses: actions/cache@v3
        with:
          path: |
            ~/.casos-cache
            ./casos
          key: casos-${{ matrix.casos-version }}-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            casos-${{ matrix.casos-version }}-${{ runner.os }}-
            casos-${{ matrix.casos-version }}-
      
      - name: Checkout specific CaSoS version (if not cached)
        if: steps.cache-casos.outputs.cache-hit != 'true'
        uses: actions/checkout@v4  # Updated to v4
        with:
          repository: iFR-OFC/casos
          path: casos-temp
          ref: ${{ matrix.casos-version }}

      - name: Setup CaSoS
        run: |
          # Create cache directory if it doesn't exist
          mkdir -p ~/.casos-cache/${{ matrix.casos-version }}

          if [ -d "casos" ] && [ "$(ls -A casos)" ]; then
            echo "CaSoS already set up in ./casos"
          elif [ -d "casos-temp" ]; then
            echo "Moving fresh checkout to ./casos"
            mv casos-temp casos
            # Cache the checkout
            cp -r casos/* ~/.casos-cache/${{ matrix.casos-version }}/
          elif [ -d "$HOME/.casos-cache/${{ matrix.casos-version }}" ] && [ "$(ls -A $HOME/.casos-cache/${{ matrix.casos-version }})" ]; then
            echo "Restoring from cache"
            mkdir -p casos
            cp -r $HOME/.casos-cache/${{ matrix.casos-version }}/* casos/
          else
            echo "Cloning CaSoS directly"
            git clone --branch ${{ matrix.casos-version }} https://github.com/iFR-OFC/casos.git casos
            # Cache for future runs
            cp -r casos/* ~/.casos-cache/${{ matrix.casos-version }}/
          fi

          # Verify CaSoS was set up correctly
          if [ ! -d "casos" ]; then
            echo "Error: CaSoS directory not found!"
            exit 1
          fi
          echo "CaSoS ${{ matrix.casos-version }} setup complete"
          
      # Setup CasADi
      - name: Setup CasADi
        uses: ./.github/actions/CasADi-setup
        with:
          message: "Setup CasADi"

      # Setup solvers
      - name: Setup Solvers
        uses: ./.github/actions/solvers-setup
        with:
          message: "Setup solvers (Mosek, sedumi)"

      # Run all of the examples in the package
      - name: Run example package
        uses: matlab-actions/run-command@v2
        with:
          command: |
            % add all necessary paths
            addpath(genpath(pwd));
            addpath(genpath('casos')); 

            % run the scrypt to test all of the files
            test_action

            if ~status
              error('One or more examples failed with CaSoS ${{ matrix.casos-version }}. Check example_results.md for details.');
            end

      - name: Check the output
        shell: bash 
        run: |
          if [ -f "example_results.md" ]; then
            echo "### Test Results for CaSoS ${{ matrix.casos-version }}" 
            cat example_results.md
            echo ""
            echo "## Summary for CaSoS ${{ matrix.casos-version }}" >> $GITHUB_STEP_SUMMARY
            cat example_results.md >> $GITHUB_STEP_SUMMARY
          else
            echo "Warning: example_results.md not found for CaSoS ${{ matrix.casos-version }}"
          fi

      # Upload results as artifacts
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: example-results-casos-${{ matrix.casos-version }}
          path: |
            example_results.md
            *.log
          if-no-files-found: warn

      # Create version-specific badge/status
      - name: Create version status
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" == "success" ]; then
            echo "CaSoS ${{ matrix.casos-version }} tests passed" >> version_status.txt
          else
            echo "CaSoS ${{ matrix.casos-version }} tests failed" >> version_status.txt
          fi

      # Upload version status
      - name: Upload version status
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: version-status-${{ matrix.casos-version }}
          path: version_status.txt

  # Create compatibility summary
  create-compatibility-summary:
    name: Create CaSoS Compatibility Summary
    needs: [get-casos-releases, example-package-check]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download version statuses
        uses: actions/download-artifact@v4
        with:
          path: statuses
          pattern: version-status-*
          merge-multiple: true
      
      - name: Create compatibility matrix
        run: |
          cat > COMPATIBILITY_MATRIX.md << 'EOF'
          # CaSoS Compatibility Matrix
          
          Generated on: $(date)
          
          | CaSoS Version | Status | Test Date |
          |--------------|--------|-----------|
          EOF
          
          # Add all tested versions
          if [ -d "statuses" ]; then
            for status_file in statuses/version-status-*.txt; do
              if [ -f "$status_file" ]; then
                VERSION=$(basename "$status_file" | sed 's/version-status-//' | sed 's/.txt//')
                STATUS=$(cat "$status_file")
                echo "| $VERSION | $STATUS | $(date) |" >> COMPATIBILITY_MATRIX.md
              fi
            done
          fi
          
          # Display the matrix
          cat COMPATIBILITY_MATRIX.md
          
          # Add to GitHub step summary
          cat COMPATIBILITY_MATRIX.md >> $GITHUB_STEP_SUMMARY
      
      - name: Upload compatibility matrix
        uses: actions/upload-artifact@v4
        with:
          name: compatibility-matrix
          path: COMPATIBILITY_MATRIX.md
      
      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const matrix = fs.readFileSync('COMPATIBILITY_MATRIX.md', 'utf8');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## CaSoS Compatibility Test Results\n\n${matrix}`
            });